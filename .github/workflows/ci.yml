name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: marketplace123
          POSTGRES_DB: marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://marketplace:marketplace123@localhost:5432/marketplace_test
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://marketplace:marketplace123@localhost:5432/marketplace_test
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://marketplace:marketplace123@localhost:5432/marketplace_test
          JWT_SECRET: test_secret
          JWT_EXPIRES_IN: 1d
        run: npm run test

      - name: Build
        working-directory: apps/backend
        run: npm run build

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Type check
        working-directory: apps/frontend
        run: npm run type-check 2>/dev/null || npx tsc --noEmit

      - name: Build
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build
